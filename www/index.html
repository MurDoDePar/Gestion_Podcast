<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PodStream - Gestion de Podcasts</title>
    <meta name="description" content="Gérez et écoutez vos podcasts favoris avec PodStream.">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Material Icons (Rounded) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <div id="app" class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="logo">
                <span class="material-symbols-rounded">podcasts</span>
                <h1>PodStream</h1>
            </div>
            <div class="header-actions" id="header-actions" style="gap: 8px;">
                <button class="icon-btn nav-item active" data-target="view-home" aria-label="Accueil" title="Accueil" style="flex: none; flex-direction: row;">
                    <span class="material-symbols-rounded">home</span>
                </button>
                <button class="icon-btn nav-item" data-target="view-search" aria-label="Recherche" title="Recherche" style="flex: none; flex-direction: row;">
                    <span class="material-symbols-rounded">search</span>
                </button>
                <button id="btn-settings" class="icon-btn" aria-label="Paramètres" title="Paramètres">
                    <span class="material-symbols-rounded">settings</span>
                </button>
            </div>
        </header>

        <!-- Global Audio Player (Under Title) -->
        <div id="audio-player-container" class="player-container hidden">
            <div class="progress-bar-container" id="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            
            <div class="player-content">
                <img src="" alt="" id="player-art" class="player-art">
                <div class="player-info">
                    <div id="player-title" class="player-title">Titre de l'épisode</div>
                    <div id="player-podcast" class="player-podcast">Nom du podcast</div>
                </div>
                <div class="player-controls">
                    <button class="icon-btn" id="btn-rewind"><span class="material-symbols-rounded">replay_10</span></button>
                    <button class="icon-btn play-btn" id="btn-play-pause"><span class="material-symbols-rounded" id="play-icon">play_arrow</span></button>
                    <button class="icon-btn" id="btn-forward"><span class="material-symbols-rounded">forward_10</span></button>
                </div>
            </div>
            <!-- Audio element hidden -->
            <audio id="main-audio"></audio>
        </div>

        <!-- Main Content Area -->
        <main class="main-content">
            <section id="view-home" class="view active">
                <!-- Top Tabs -->
                <div class="top-tabs">
                    <button class="top-tab active" data-target="tab-mes-podcasts">Mes podcasts</button>
                    <button class="top-tab" data-target="tab-theme">Par thème</button>
                    <button class="top-tab" data-target="tab-popular">Populaires</button>
                </div>

                <!-- Tab: Mes Podcasts -->
                <div id="tab-mes-podcasts" class="tab-content active">
                    <div class="section-title">
                        <h2>Mes Podcasts</h2>
                        <button id="btn-add-podcast" class="icon-btn primary-icon"><span class="material-symbols-rounded">add</span></button>
                    </div>
                    <div id="subscribed-list" class="horizontal-scroll">
                        <p class="empty-state">Aucun podcast. Ajoutez-en un !</p>
                    </div>

                    <div class="section-title mt-4">
                        <h2>Nouveautés</h2>
                    </div>
                    <ul id="new-episodes-list" class="episode-list">
                    </ul>
                </div>

                <!-- Tab: Par Thème -->
                <div id="tab-theme" class="tab-content hidden">
                    <div id="grand-theme-tabs" class="top-tabs mt-4"></div>
                    <div id="sub-theme-list"></div>
                    
                    <div class="section-title mt-4 hidden" id="theme-results-title">
                        <h2>Résultats</h2>
                    </div>
                    <div id="theme-podcast-list" class="multi-grid mt-2">
                        <p class="empty-state">Sélectionnez une sous-catégorie.</p>
                    </div>
                </div>

                <!-- Tab: Populaires -->
                <div id="tab-popular" class="tab-content hidden">
                    <div id="popular-list" class="multi-grid mt-2">
                        <div class="loader"></div>
                    </div>
                </div>
            </section>

            <!-- View: Search -->
            <section id="view-search" class="view hidden">
                <div class="search-bar">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" id="search-input" placeholder="Rechercher un podcast...">
                </div>
                <div id="search-results" class="multi-grid">
                    <!-- Search Results -->
                </div>
                <div id="search-loader" class="loader hidden"></div>
            </section>

            <!-- View: Podcast Details -->
            <section id="view-podcast" class="view hidden">
                <button id="btn-back-podcast" class="icon-btn back-btn"><span class="material-symbols-rounded">arrow_back</span></button>
                <div class="podcast-header" id="podcast-header">
                    <!-- Dynamic Info -->
                </div>
                <div class="podcast-actions">
                    <button id="btn-subscribe" class="btn primary-btn">S'abonner</button>
                </div>
                <ul id="podcast-episodes-list" class="episode-list mt-4">
                    <!-- Episodes -->
                </ul>
            </section>

            <!-- View: Settings & Language -->
            <section id="view-settings" class="view hidden">
                <button id="btn-back-settings" class="icon-btn back-btn"><span class="material-symbols-rounded">arrow_back</span></button>
                <div class="section-title">
                    <h2>Paramètres</h2>
                </div>
                
                <div class="settings-group">
                    <label for="language-select">Langue des podcasts</label>
                    <select id="language-select" class="custom-select">
                        <option value="all">Toutes les langues</option>
                        <option value="fr">Français</option>
                        <option value="en">Anglais</option>
                        <option value="es">Espagnol</option>
                        <option value="de">Allemand</option>
                    </select>
                </div>
                 <div class="settings-group">
                    <label for="order-select">Ordre d'écoute par défaut</label>
                    <select id="order-select" class="custom-select">
                        <option value="desc">Du plus récent au plus ancien</option>
                        <option value="asc">Du plus ancien au plus récent</option>
                    </select>
                </div>
            </section>
        </main>


    </div>

    <script src="app.js"></script>
</body>
</html>
