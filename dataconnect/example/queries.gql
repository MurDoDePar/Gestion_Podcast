query FindUserByGoogleId($googleId: String!) @auth(level: USER) {
  users(where: { googleId: { eq: $googleId } }, limit: 1) {
    id
    googleId
    displayName
    email
  }
}

query GetMySubscriptions($userId: UUID!) @auth(level: USER) {
  subscriptionTypes(where: { userId: { eq: $userId } }) {
    listOrder
    podcast {
      id
      title
      feedUrl
      imageUrl
      author
      categories
    }
  }
}

query GetListenHistory($userId: UUID!) @auth(level: USER) {
  listenHistories(where: { userId: { eq: $userId } }) {
    episode {
      id
      audioUrl
    }
    progressSeconds
    finishedListening
  }
}

query GetRecommendations($feedUrl: String!) @auth(level: USER) {
  subscriptionTypes(where: { podcast: { feedUrl: { eq: $feedUrl } } }) {
    user {
      subscriptionTypes_on_user {
        podcast {
          id
          title
          imageUrl
          feedUrl
          author
          categories
        }
      }
    }
  }
}

query GetEpisodesByPodcast($podcastId: UUID!) @auth(level: USER) {
  episodes(where: { podcastId: { eq: $podcastId } }, orderBy: { publishedAt: DESC }) {
    id
    title
    audioUrl
    duration
    description
    imageUrl
    publishedAt
  }
}

query GetLatestSubscribedEpisodes($userId: UUID!) @auth(level: USER) {
  subscriptionTypes(where: { userId: { eq: $userId } }) {
    listOrder
    podcast {
      id
      title
      imageUrl
      episodes_on_podcast(orderBy: { publishedAt: DESC }, limit: 5) {
        id
        title
        audioUrl
        publishedAt
        imageUrl
      }
    }
  }
}
