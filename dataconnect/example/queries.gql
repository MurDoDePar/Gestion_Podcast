query FindUserByGoogleId($googleId: String!) @auth(level: USER) {
  users(where: { googleId: { eq: $googleId } }, limit: 1) {
    id
    googleId
    displayName
    email
  }
}

query GetMySubscriptions($userId: UUID!) @auth(level: USER) {
  subscriptionTypes(where: { userId: { eq: $userId } }) {
    user @redact {
      googleId
    }
    listOrder
    podcast {
      id
      title
      feedUrl
      imageUrl
      author
      categories
    }
  }
}

query GetListenHistory($userId: UUID!) @auth(level: USER) {
  listenHistories(where: { userId: { eq: $userId } }) {
    user @redact {
      googleId
    }
    episode {
      id
      audioUrl
    }
    progressSeconds
    finishedListening
  }
}

query GetRecommendations($feedUrl: String!) @auth(level: PUBLIC, insecureReason: "Recommendations are public anonymous data") {
  subscriptionTypes(where: { podcast: { feedUrl: { eq: $feedUrl } } }) {
    user {
      subscriptionTypes_on_user {
        podcast {
          id
          title
          imageUrl
          feedUrl
          author
          categories
        }
      }
    }
  }
}
 
query GetEpisodesByPodcast($podcastId: UUID!) @auth(level: PUBLIC, insecureReason: "Episodes are public data") {
  episodes(where: { podcastId: { eq: $podcastId } }, orderBy: { publishedAt: DESC }) {
    id
    title
    audioUrl
    duration
    description
    imageUrl
    publishedAt
  }
}

query GetLatestSubscribedEpisodes($userId: UUID!) @auth(level: USER) {
  subscriptionTypes(where: { userId: { eq: $userId } }) {
    user @redact {
      googleId
    }
    listOrder
    podcast {
      id
      title
      imageUrl
      episodes_on_podcast(orderBy: { publishedAt: DESC }, limit: 20) {
        id
        title
        audioUrl
        publishedAt
        imageUrl
        description
      }
    }
  }
}

query GetOldestSubscribedEpisodes($userId: UUID!) @auth(level: USER) {
  subscriptionTypes(where: { userId: { eq: $userId } }) {
    user @redact {
      googleId
    }
    listOrder
    podcast {
      id
      title
      imageUrl
      oldest_episodes: episodes_on_podcast(orderBy: { publishedAt: ASC }, limit: 50) {
        id
        title
        audioUrl
        publishedAt
        imageUrl
        description
      }
    }
  }
}

query GetAppCache($id: String!) @auth(level: PUBLIC, insecureReason: "The cache contains generic public podcasts data") {
  appCache(id: $id) {
    id
    data
    updatedAt
  }
}

query GetPodcastByFeedUrl($feedUrl: String!) @auth(level: PUBLIC, insecureReason: "Podcasts are public data") {
  podcasts(where: { feedUrl: { eq: $feedUrl } }, limit: 1) {
    id
    title
    feedUrl
    imageUrl
  }
}

